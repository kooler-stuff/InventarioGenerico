     <script>
        function OrdenarTabla(tabla) {
                const TablaOrdenada = tabla.slice().sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
                return TablaOrdenada 
            }

        function CreateElement(Item, Stock, Category) { 
            var grid = document.getElementById('inventory-grid');
            var BaseDiv = document.createElement('div');
            BaseDiv.className = 'inventory-item';
            BaseDiv.innerHTML = `
                <h3>${Item}</h3>
                <p>Stock: ${Stock}</p>
                <small>Categoría: ${Category}</small> 
            `;
            grid.appendChild(BaseDiv);
        }

        function LoadInventory() {
            // Esta función ahora es manejada por menu.js
        }
        function toggleDropdown() {
            document.getElementById("dropdown-content").classList.toggle("dropdown-show");
        }
        function handleFile(file) {
                    if (file && file.type.startsWith("image/")) {
                        const reader = new FileReader();
                        const DefaultImage = document.getElementById("FileUpload");
                        reader.onload = function (e) {
                            previewContainer.innerHTML = `<img src="${e.target.result}" alt="Uploaded Image">`;
                            previewContainer.querySelector("img").style.display = "block";
                            DefaultImage.style.display = "none";
                        };
                        reader.readAsDataURL(file);
                    } else {
                        alert("Please upload a valid image file.");
                    }
                }
    </script>

                            <div class="dropdown"> 
                                <label for="filter" class="ButtonFilter" style="display: inline-block; align-items: center; max-width: 30px; max-height: 30px;" title="Filtrar por categoría">

                    </div>
                     
                    <div class="tab-buttons" style="margin:0;border:none;flex: shrink 1; margin-right: 15px;">

    <script>
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');

    let inventoryData = [];
    let currentInventoryPage = 1;
    let inventoryPerPage = 20;

    let historialData = [];
    let currentHistorialPage = 1;
    let historialPerPage = 10;

    const OverlayCreateElementHtml = `
        <button type="button" class="popup-close">×</button>
        <div class="popup-content">
            <div class="popup-content-title"> Agregar nuevo elemento:</div>
            <br>
            <form id="form-add" class="inventory-form">
                <div class="form-group">
                    <label>Insumo:</label> <br>
                    
                    <input type="text" id="insumo" class="ButtonGeneric" placeholder="Ej: Resma A4" required maxlength="120";>
                </div>

                <div>
                    <label>Subir imagen (opcional):</label> <br>

                    <label for="ped-imagen" class="ButtonFiles2" id="DropArea" style="width: 32px; height: 32px;" title="Subir imagen">
                        <div id="previewContainer"></div>
                        <img src="../media/images-black.svg" id="FileUpload" class="ButtonSubmitImage" width="32px" height="32px">
                    </label>

                    

                    <input type="file" id="ped-imagen" name="imagen" accept="image/*" onchange="handleFile(this.files[0])">
                </div>

                <div class="form-group">
                    <label>Categoría:</label>
                    <select id="categoria" class="ButtonGenericCat" placeholder="Ej: Librería" required>
                    <option value="almacen"> Almacén </option>
                    <option value="libreria"> Librería </option>
                    <option value="limpieza"> Limpieza </option>
                    <option value="miscelaneo"> Misceláneo </option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Unidades:</label>
                    <input type="number" id="unidades" class="ButtonGeneric" placeholder="0" min="0" max="9999" required>
                </div>

                <button type="submit" class="ButtonSubmit">Guardar en Inventario</button>
            </form>
        </div>
    `;
    let currentWindow ="";

    const overlay = document.createElement('div');
    overlay.className = 'popup';
    overlay.id = 'popup';
    overlay.innerHTML = OverlayCreateElementHtml;
    document.body.appendChild(overlay);

    const overlay2 = document.createElement("div"); 
    overlay2.className = "popup";
    overlay2.id = "popup2"; 

    overlay2.innerHTML = `
        <button type="button" class="popup-close">×</button>

        <div class="popup-content2">
            <h2>Inserte el numero a modificar</h2>
            <input type="number" id="edit-unidades" class="ButtonGeneric edit-unidades" value="0" placeholder="Unidades" max="9999"> <br>
             <br> <br>
            <button class="btn-save">Guardar</button> <br>
            <button class="btn-cancel">Cancelar</button>
        </div>
    `;

let allInsumos = [];

function filterByCategory(categoria) {
    if (categoria === 'todas') {
        renderInventory(allInsumos);
        document.getElementById("ButtonFilterIMG").classList.remove("ButtonFilterImageActive")
    } else {
        const filtrados = allInsumos.filter(item => 
            item.categoria && item.categoria.toLowerCase() === categoria.toLowerCase()
        );
        document.getElementById("ButtonFilterIMG").classList.add("ButtonFilterImageActive")
        renderInventory(filtrados);
    }
    document.getElementById("dropdown-content").classList.remove("dropdown-show");
}
    
document.getElementById("dropdown-content").classList.remove("dropdown-show");

    document.body.appendChild(overlay2);

    document.addEventListener('click', function(event) {

        if (event.target && event.target.matches('.popup-close')) {
            overlay.style.display = "none"; 
            overlay2.style.display = "none";
        }
    });

    document.addEventListener("DOMContentLoaded", async (event) => {
        document.getElementById("MainContainer").style.display = "none";
        try { 
            const response = await fetch('/verify');
            const permLvl = await response.json();
            console.log(response);
            console.log(permLvl);
            const userRoleLabel = document.getElementById('user-role');
            if (userRoleLabel) {
                userRoleLabel.textContent = permLvl.permsLevel === 'admin' ? 'Rol: Admin' : 'Rol: Usuario común';
            }
            if (permLvl.success && permLvl.permsLevel === "user"){
                console.log("bot");
                window.location.href = "menu_basic.html";
            } else {
                document.getElementById("MainContainer").style.display = "block";
                console.log("ok");
            }
        } catch (err) {
            console.log(err);
        }
       
    })

    document.addEventListener("DOMContentLoaded", function () {

        const dropArea = document.getElementById("DropArea");
        const fileInput = document.getElementById("ped-imagen");
        const previewContainer = document.getElementById("previewContainer");

        dropArea.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropArea.classList.add("highlight");
        });

        dropArea.addEventListener("dragleave", () => {
            dropArea.classList.remove("highlight");
        });

        dropArea.addEventListener("drop", (e) => {
            e.preventDefault();
            dropArea.classList.remove("highlight");

            const file = e.dataTransfer.files[0];
            handleFile(file);
        });

        fileInput.addEventListener("change", (e) => {

            const file = e.target.files[0];
            handleFile(file);
        });

        function handleFile(file) {

            if (file && file.type.startsWith("image/")) {

                const reader = new FileReader();

                reader.onload = function (e) {

                    previewContainer.innerHTML = `
                        <img src="${e.target.result}" alt="Uploaded Image">
                    `;

                    previewContainer.querySelector("img").style.display = "block";
                };

                reader.readAsDataURL(file);

            } else {
                alert("Please upload a valid image file.");
            }
        }
    });

    tabBtns.forEach(btn => {

        btn.addEventListener('click', () => {

            tabBtns.forEach(b => b.classList.remove('active'));
            tabContents.forEach(c => c.classList.remove('active'));

            btn.classList.add('active');

            const element = document.getElementById(btn.dataset.tab);

            if (element) element.classList.add('active');

            if (btn.dataset.tab === 'inventario')
                renderInventory("GenericLoad");

            if (btn.dataset.tab === 'historial')
                loadHistorialInventario();

            if (btn.dataset.tab === "AgregarInsumo")
                AddNewItem();
        });
    });

    async function ResetSelected(selected) {

        const lists = [
            document.getElementById('historial'),
            document.getElementById('inventory-grid')
        ];

        for (let i = 0; i < lists.length; i++ ) {

            if (lists[i].className === selected.className){
                lists[i].classList.add("active");
            } else { 
                lists[i].classList.remove("active");
            }

            lists[i].innerHTML = "";
        }
    }

    function renderPagination(containerId, currentPage, totalPages, callbackName) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';
        if (totalPages <= 1) return;

        let html = '';
        if (currentPage > 1) {
            html += `<button type="button" class="pagination-btn" onclick="${callbackName}(${currentPage - 1})">Anterior</button>`;
        }
        for (let i = 1; i <= totalPages; i++) {
            html += `<button type="button" class="pagination-btn${i === currentPage ? ' active' : ''}" onclick="${callbackName}(${i})">${i}</button>`;
        }
        if (currentPage < totalPages) {
            html += `<button type="button" class="pagination-btn" onclick="${callbackName}(${currentPage + 1})">Siguiente</button>`;
        }
        container.innerHTML = html;
    }

    function renderInventoryPage(page) {
        const inventoryGrid = document.getElementById('inventory-grid');
        const pagination = document.getElementById('inventario-pagination');
        inventoryGrid.innerHTML = '';

        if (!Array.isArray(inventoryData) || inventoryData.length === 0) {
            inventoryGrid.innerHTML = '<p>No hay insumos cargados todavía.</p>';
            if (pagination) pagination.innerHTML = '';
            return;
        }

        const totalPages = Math.ceil(inventoryData.length / inventoryPerPage);
        const start = (page - 1) * inventoryPerPage;
        const pageItems = inventoryData.slice(start, start + inventoryPerPage);

        pageItems.forEach(item => {
            const itemCard = document.createElement('div');
            itemCard.className = 'inventory-item';
            itemCard.dataset.id = item._id;
            itemCard.innerHTML = `
                <p>Stock: ${item.unidades}</p>
                ${item.imagen ? `<img src="${item.imagen}" alt="foto" class="inventory-image">` : `<div class="inventory-image-placeholder">No hay imagen disponible.</div>`}

                <h3 class="itemname">${item.insumo}</h3>

                <small>
                    Categoría: <br> ${item.categoria}
                </small> <br>
                <div class="item-actions">
                    <button class="btn-increase">
                        <img src="media/add_white.svg" alt="Agregar">
                    </button>
                    <button class="btn-decrease">
                        <img src="media/remove_white.svg" alt="Restar">
                    </button>
                    <button class="btn-delete">
                        <img src="media/trash-white.svg" alt="Eliminar">
                    </button>
                </div>
            `;

            const addButton = itemCard.querySelector('.btn-increase');
            addButton.addEventListener('click', () => {
                enterEditMode(itemCard, item, "Agregar");
            });

            const decreaseButton = itemCard.querySelector('.btn-decrease');
            decreaseButton.addEventListener('click', () => {
                enterEditMode(itemCard, item, "Quitar");
            });

            const deleteButton = itemCard.querySelector('.btn-delete');
            deleteButton.addEventListener('click', async () => {
                const confirmed = confirm(`¿Eliminar el insumo "${item.insumo}"?`);
                if (!confirmed) return;
                try {
                    const deleteResponse = await fetch('/api/borrarinsumo', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ id: item._id })
                    });
                    const deleteResult = await deleteResponse.json();
                    if (deleteResponse.ok && deleteResult.success) {
                        await renderInventory("GenericLoad");
                    } else {
                        alert('No se pudo eliminar el insumo.');
                    }
                } catch (error) {
                    console.error('Error al borrar:', error);
                    alert('Ocurrió un error al intentar eliminar el insumo.');
                }
            });

            inventoryGrid.appendChild(itemCard);
        });

        renderPagination('inventario-pagination', page, totalPages, 'goToInventoryPage');
        currentInventoryPage = page;
    }

    function goToInventoryPage(page) {
        renderInventoryPage(page);
    }

    async function renderInventory(insumos) {

        const list = document.getElementById('historial');
        const inventoryGrid = document.getElementById('inventory-grid');

        ResetSelected(inventoryGrid);

        try {

            if (insumos === "GenericLoad") {

                const response = await fetch('/api/insumo');
                insumos = await response.json();
            }

            if (!Array.isArray(insumos) || insumos.length === 0) {

                inventoryGrid.innerHTML = '<p>No hay insumos cargados todavía.</p>';
                const pagination = document.getElementById('inventario-pagination');
                if (pagination) pagination.innerHTML = '';
                return;
            }

            inventoryData = OrdenarTabla(insumos);
            currentInventoryPage = 1;
            renderInventoryPage(currentInventoryPage);

        } catch (error) {

            console.error('Error al cargar los datos:', error);
            inventoryGrid.innerHTML = '<p>Error al conectar con el servidor.</p>';
        }
    }

    function renderHistorialPage(page) {
        const list = document.getElementById('historial');
        const pagination = document.getElementById('historial-pagination');
        list.innerHTML = '';

        if (!Array.isArray(historialData) || historialData.length === 0) {
            list.innerHTML = '<p>No hay registros de cambios.</p>';
            if (pagination) pagination.innerHTML = '';
            return;
        }

        const totalPages = Math.ceil(historialData.length / historialPerPage);
        const start = (page - 1) * historialPerPage;
        const pageItems = historialData.slice(start, start + historialPerPage);

        let html = `
            <table class="history-table" style="width:100%; border: 2px solid #444; border-collapse: collapse; border-spacing: 0 20px;">
                <thead style="border: 1px solid #444;">
                    <tr >
                        <th>Insumo</th>
                        <th>Categoría</th>
                        <th>Unidades</th>
                        <th>Tipo</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody>
        `;

        pageItems.forEach(item => {
            html += `
                <tr style="border: 1px solid #444; padding: 20px;">
                    <td class="inventory-registry">${item.insumo}</td>
                    <td class="inventory-registry">${item.categoria}</td>
                    <td class="inventory-registry">${item.unidades}</td>
                    <td class="inventory-registry">${item.accion}</td>
                    <td class="inventory-registry">${new Date(item.fecha).toLocaleDateString()}</td>
                </tr>
            `;
        });

        html += '</tbody></table>';

        list.innerHTML = html;
        renderPagination('historial-pagination', page, totalPages, 'goToHistorialPage');
        currentHistorialPage = page;
    }

    function goToHistorialPage(page) {
        renderHistorialPage(page);
    }

    async function loadHistorialInventario() {

        const list = document.getElementById('historial');
        const inventoryGrid = document.getElementById('inventory-grid');

        ResetSelected(list);

        try {

            const response = await fetch('/api/historial-inventario');
            const historial = await response.json();

            historialData = OrdenarTabla(historial);
            currentHistorialPage = 1;
            renderHistorialPage(currentHistorialPage);

        } catch (error) {

            console.error('Error al cargar historial:', error);
            list.innerHTML = '<p>Error al conectar.</p>';
        }
    }

    async function AddNewItem() {
        overlay.style.display = "flex";
    }

    function enterEditMode(card, item, mode) {

        overlay2.style.display = "flex";

        const saveButton = overlay2.querySelector('.btn-save');
        const cancelButton = overlay2.querySelector('.btn-cancel');

        saveButton.onclick = async () => {

            let unidades = parseInt(
                overlay2.querySelector('.edit-unidades').value
            );

            const insumo = item.insumo;
            const categoria = item.categoria;

            let UnidadFinal = null;
            let action = "";

            if (isNaN(unidades)) {

                alert('Por favor, complete todos los campos correctamente.');
                return;
            }

            if (mode==="Quitar") {

                UnidadFinal = item.unidades - unidades;
                action = 1;

            } else {

                UnidadFinal = item.unidades + unidades;
                action = 2;
            }

            try {

                const response = await fetch('/api/modificarinsumo', {

                    method: 'PUT',

                    headers: {
                        'Content-Type': 'application/json'
                    },

                    body: JSON.stringify({
                        id: item._id,
                        categoria,
                        insumo,
                        UnidadFinal,
                        action
                    })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    document.getElementById('edit-unidades').value = "0";

                    await renderInventory("GenericLoad");

                } else {

                    alert('No se pudo modificar el insumo.');
                }

            } catch (error) {

                console.error('Error al modificar:', error);
                alert('Ocurrió un error al intentar modificar el insumo.');
            }

            overlay2.style.display = "none";
        };

        cancelButton.onclick = () => {

            overlay2.style.display = "none";
            renderInventory("GenericLoad");
        };
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderInventory("GenericLoad");
    });

    document.addEventListener('DOMContentLoaded', async () => {

        try {

            const response = await fetch('/api/insumo'); 
            allInsumos = await response.json();

            const searchInput = document.getElementById('search-input');

            if (searchInput) {

                searchInput.addEventListener('input', () => {

                    const filter = searchInput.value.trim().toLowerCase();

                    const filtered = allInsumos.filter(item =>
                        (item.insumo || item.objeto_specifico || '')
                        .toLowerCase()
                        .includes(filter)
                    );

                    renderInventory(filtered);
                });
            }

            renderInventory(allInsumos);

        } catch (error) {

            console.error("Error al cargar los datos:", error);

            document.getElementById('inventory-grid').innerHTML =
                "<p>Error al conectar con el servidor.</p>";
        }
    });

    document.getElementById('form-add').addEventListener('submit', async (e) => {

        e.preventDefault();

        const nuevoInsumo = new FormData();

        nuevoInsumo.append(
            'categoria',
            document.getElementById('categoria').value
        );

        nuevoInsumo.append(
            'insumo',
            document.getElementById('insumo').value
        );

        nuevoInsumo.append(
            'unidades',
            parseInt(document.getElementById('unidades').value)
        );

        const imagenFile = document.getElementById('ped-imagen').files[0];

        if (imagenFile) {
            nuevoInsumo.append('imagen', imagenFile);
        }

        try {

            const response = await fetch('/insumo', {
                method: 'POST',
                body: nuevoInsumo
            });

            const resData = await response.json();

            if (resData.success) {

                alert("¡Insumo guardado correctamente!");
                document.getElementById('form-add').reset();
                location.reload();

            } else {

                alert("Error: " + resData.message);
            }

        } catch (err) {

            console.error(err);
            alert("Error al conectar con el servidor");
        }
        
    });

    function applySavedTheme() {
        const savedTheme = localStorage.getItem('theme-mode');
        if (savedTheme === 'light' || savedTheme === 'dark') {
            document.body.setAttribute('data-theme', savedTheme);
        }
    }

    function toggleTheme() {
        const nextTheme = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.body.setAttribute('data-theme', nextTheme);
        localStorage.setItem('theme-mode', nextTheme);
    }

    applySavedTheme();

    async function logout() {
        try {
            const response = await fetch('/logout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            const result = await response.json();
            if (result.success) {
                window.location.href = result.redirect || '/';
            } else {
                alert('No se pudo cerrar sesión.');
            }
        } catch (error) {
            console.error('Error al cerrar sesión:', error);
            alert('Error al cerrar sesión.');
        }
    }

    const logoutBtn = document.getElementById('logout-btn');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', logout);
    }

    const themeBtn = document.createElement('button');
    themeBtn.innerHTML = '🌓';
    themeBtn.className = 'theme-toggle-widget';
    document.body.appendChild(themeBtn);

    const mediaQuery = window.matchMedia('(max-width: 900px)');

    function screenSizeChange(e) {
        if (e.matches) {
            inventoryPerPage = 12;
            historialPerPage = 20;
        } else {
            inventoryPerPage = 20;
            historialPerPage = 50;
        }
        renderInventory("GenericLoad")
    }

    screenSizeChange(window.screen.height);
    mediaQuery.addEventListener('change', screenSizeChange);   
    themeBtn.addEventListener('click', toggleTheme);
</script>
</html>
