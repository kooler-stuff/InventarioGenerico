<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./styles/MainStyle.css">
        <style>
        </style>
        <link rel="icon" href="/media/icon.ico">
        <title>Realizar un pedido...</title>
    </head>
    <body data-theme="dark">
        <div class="container container-main" id="main-container">
            <div style="display: flex;align-items:center; justify-content:space-between;gap: 15px;margin-bottom:15px;width:100%; margin-top: -80px; margin-bottom: 100px;"> 
                <h1 class="titler1" style="margin:0;flex-shrink:0;">Realiza un pedido:</h1>
            </div>
            <h2></h2>
            <form id="form-pedido" class="formGeneric" enctype="multipart/form-data"> 
                <input type="text" id="ped-insumo" maxlength="60" class="ButtonGeneric" placeholder="Nombre del insumo" name="insumo" required style="flex: 1; min-width: 150px;">
                <input type="number" id="ped-cantidad" min="0" max="10000" class="ButtonGeneric" placeholder="Cantidad" name="cantidad" required style="flex: 1; min-width: 100px;">
                <input type="text" list="areas" id="ped-area" maxlength="40" class="ButtonGeneric" placeholder="Área" name="area" required style="flex: 1; min-width: 150px;" />
                    <datalist id="areas">
                        <option>Sala</option>
                        <option>Investigacion y desarrollo</option>
                        <option>Equipo técnico</option>
                    </datalist>
                <button type="submit" class="ButtonSubmit" style="flex: 1; min-width: 120px; border-radius: 10px; margin-top: 0px; max-height: 50px;">Registrar</button> <br> 
                <button type="button" onclick="AddBulkUploadInstance()" title="Añadir otro pedido..." style="margin-left: -10px; margin-right: 20px;" id="addInstanceBtn" class="formAddBtn"> <img class="AddOrderImage"> </button>
                <div id="pedido-info" class="inventory-grid"></div>
                <textarea name="descripcion" class="ButtonGeneric2" id="ped-descripcion" placeholder="Descripción del pedido" maxlength="500" required></textarea>
            </div>
        </form>
    </body>
    <script>  
        let ExtraUploadsCreated = 0; 
        const MainContainer = document.getElementById("main-container");
        function OrdenarTabla(tabla) {
            const TablaOrdenada = tabla.slice().sort((a, b) => b.dataset.id - a.dataset.id);
            return TablaOrdenada 
        }

        function CheckAllComplete(table){
            let Valid = true;
            for (let i of table) {
                const dat = new FormData(i);
                
                let dataCheck = {
                    insumo: dat.get('insumo'),
                    cantidad: parseInt(dat.get('cantidad')),
                    area: dat.get('area'),
                    descripcion: dat.get('descripcion')
                };

                if (dataCheck.insumo === "" || isNaN(dataCheck.cantidad) || dataCheck.area === "" || dataCheck.descripcion === "") {
                    Valid = false;
                }
            }
            return Valid;
        }

        function RemoveBulkUploadInstance(btn){
            const parent = btn.parentNode; 
            const root = parent.parentNode;
            console.log(parent);
            console.log(parent.getAttribute("id"));
            root.remove();
        }

        function AddBulkUploadInstance(){
            const BasicForm = document.createElement('div');
                BasicForm.innerHTML = `
                <form id="form-pedido" class="formGeneric" enctype="multipart/form-data"> 
                    <input type="text" id="ped-insumo" maxlength="60" class="ButtonGeneric" placeholder="Nombre del insumo" name="insumo" required style="flex: 1; min-width: 150px;">
                    <input type="number" id="ped-cantidad" min="0" max="10000" class="ButtonGeneric" placeholder="Cantidad" name="cantidad" required style="flex: 1; min-width: 100px;">
                    <input type="text" list="areas" id="ped-area" maxlength="40" class="ButtonGeneric" placeholder="Área" name="area" required style="flex: 1; min-width: 150px;" />
                        <datalist id="areas">
                            <option>Sala</option>
                            <option>Investigacion y desarrollo</option>
                            <option>Equipo técnico</option>
                        </datalist>
                    <button type="button" onclick="UploadInBulk()" class="ButtonSubmit" style="flex: 1; min-width: 120px; border-radius: 10px;">Registrar</button> <br> 
                    <button type="button" onclick="AddBulkUploadInstance()" title="Añadir otro pedido..." id="addInstanceBtn" class="formAddBtn"> <img class="AddOrderImage"> </button> <br> 
                    <button type="button" onclick="RemoveBulkUploadInstance(this)" title="Eliminar Pedido" id="removeInstanceBtn" class="formAddBtn"> <img class="RemoveOrderImage"> </button>
                    <div id="pedido-info" class="inventory-grid"></div>
                    <textarea name="descripcion" class="ButtonGeneric2" id="ped-descripcion" placeholder="Descripción del pedido" maxlength="500" required></textarea>
                </form>
                `;
            MainContainer.appendChild(BasicForm);
            console.log("extraForm"+ExtraUploadsCreated);
            BasicForm.dataset.id = "extraForm"+ExtraUploadsCreated;
            ExtraUploadsCreated += 1; 
        }
        async function UploadInBulk() {
            const formularios = MainContainer.querySelectorAll('.formGeneric');
            
            if(formularios.length === 0) {
                alert("No hay pedidos para enviar.");
                return;
            }
            let allComplete = CheckAllComplete(formularios);
            if(!allComplete) {
                alert("Por favor, complete todos los campos de todos los pedidos antes de enviarlos.");
                return;
            }

            for (const form of formularios) {
                const formData = new FormData(form);
                
                const dataToSend = {
                    insumo: formData.get('insumo'),
                    cantidad: parseInt(formData.get('cantidad')),
                    area: formData.get('area'),
                    descripcion: formData.get('descripcion')
                };

                try {
                    const response = await fetch('/api/pedidosmisc', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(dataToSend)
                    });
                    
                    const result = await response.json();
                    if (result.success) {
                        form.parentNode.remove();
                    }
                } catch (error) {
                    console.error("Error enviando un pedido individual:", error);
                }
            }
            
            alert("Todos los pedidos han sido enviados.");
            location.reload();
        }
        async function UploadSingle(){
            try {
                    const pedido = new FormData();
                    pedido.append('insumo', document.getElementById('ped-insumo').value);
                    pedido.append('cantidad', parseInt(document.getElementById('ped-cantidad').value));
                    pedido.append('area', document.getElementById('ped-area').value);
                    pedido.append('descripcion', document.getElementById("ped-descripcion").value);
                    console.log(pedido);
                    console.log(document.getElementById('ped-insumo').value);
                    const response = await fetch('/api/pedidosmisc', {
                        method: 'POST',

                            headers: {
                                'Content-Type': 'application/json'
                            },

                            body: JSON.stringify({
                                insumo: document.getElementById('ped-insumo').value,
                                cantidad: parseInt(document.getElementById('ped-cantidad').value),
                                area: document.getElementById('ped-area').value,
                                descripcion: document.getElementById("ped-descripcion").value
                            })
                    });
                    const result = await response.json();
                    if (result.success) {
                        alert("Pedido enviado!");
                        document.getElementById('form-pedido').reset();
                        //location.reload();  
                    } else {
                        alert('Error al registrar.');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Error al conectar.');
                }
        }
        document.getElementById('form-pedido').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formularios = MainContainer.querySelectorAll('.formGeneric');
                if(formularios.length > 1) {
                    // console.log("xd2");
                    UploadInBulk();
                    return;
                }
                UploadSingle();
            });
    </script>
</html>
